<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>System Log</title>
<style>
  body {
    background-color: black;
    color: #00ff00;
    font-family: monospace;
    padding: 20px;
    font-size: 25px;
    line-height: 1.6;
    cursor: default;
  }

  #cursor {
    display: inline-block;
    margin-left: 5px;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<div id="terminal"></div><span id="cursor">█</span>

<script>
const lines = [
"> initializing system...",
"> loading data...",
"> student: Francesca",
"> degree: Informatica",
">",
"> measuring time...",
"> execution time: years",
"> every second processed...",
">",
"> completion date: April 22, 2026",
">",
"> RESULT: SUCCESS ✔",
"> status: completed",
">",
">",
"> printf(\"Grazie per esserci stati ❤️\");"
];

let i = 0;
const terminal = document.getElementById("terminal");
const cursor = document.getElementById("cursor");

function typeLine() {
  if (i < lines.length) {
    terminal.innerHTML += lines[i] + "<br>";
    i++;
    terminal.appendChild(cursor);
    setTimeout(typeLine, 700);
  }
}

typeLine();
</script>

</body>
</html>
