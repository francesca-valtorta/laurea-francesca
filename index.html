fai le modifiche per il cursore:
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>System Log</title>
<style>
  body {
    background-color: black;
    color: #00ff00;
    font-family: monospace;
    padding: 20px;
    font-size: 25px;
    line-height: 1.6;
    cursor: default;
  }
</style>
</head>
<body>

<div id="terminal"></div>

<script>
const lines = [
"> initializing system...",
"> loading data...",
"> student: Francesca",
"> degree: Informatica",
">",
"> measuring time...",
"> execution time: years",
"> every second processed...",
">",
"> completion date: April 22, 2026",
">",
"> RESULT: SUCCESS ✔",
"> status: completed",
">",
">",
"> printf(\"Grazie per esserci stati❤️\");"
];

let i = 0;
function typeLine() {
  if (i < lines.length) {
    document.getElementById("terminal").innerHTML += lines[i] + "<br>";
    i++;
    setTimeout(typeLine, 700);
  }
}
typeLine();
</script>

</body>
</html>
